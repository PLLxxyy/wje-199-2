<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>租房记账本</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --primary: #FF6B35;
        --primary-light: #FFF3EE;
        --bg: #F5F5F5;
        --card: #FFFFFF;
        --text: #1A1A1A;
        --text-secondary: #666666;
        --text-hint: #999999;
        --border: #E8E8E8;
        --success: #4CAF50;
        --danger: #F44336;
        --tab-height: 60px;
        --header-height: 56px;
        --radius: 12px;
        --shadow: 0 2px 12px rgba(0,0,0,0.06);
      }
      html, body, #root {
        height: 100%;
        width: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
      }
      .app {
        display: flex;
        flex-direction: column;
        height: 100%;
        max-width: 480px;
        margin: 0 auto;
        background: var(--bg);
        position: relative;
      }
      .header {
        height: var(--header-height);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 16px;
        background: var(--primary);
        color: white;
        font-size: 18px;
        font-weight: 600;
        flex-shrink: 0;
        position: relative;
      }
      .header-action {
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: white;
        font-size: 28px;
        cursor: pointer;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        transition: background 0.15s;
        line-height: 1;
      }
      .header-action:hover { background: rgba(255,255,255,0.15); }
      .header-back {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: white;
        font-size: 16px;
        cursor: pointer;
        padding: 4px 8px;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .page {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding-bottom: calc(var(--tab-height) + 16px);
      }
      .page-inner {
        padding: 16px;
      }

      /* Tab Bar */
      .tab-bar {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        max-width: 480px;
        height: var(--tab-height);
        background: var(--card);
        border-top: 1px solid var(--border);
        display: flex;
        z-index: 100;
      }
      .tab-item {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        cursor: pointer;
        border: none;
        background: none;
        color: var(--text-hint);
        font-size: 11px;
        transition: color 0.15s;
      }
      .tab-item.active { color: var(--primary); }
      .tab-icon { font-size: 22px; line-height: 1; }

      /* Home Page */
      .total-card {
        background: var(--primary);
        color: white;
        border-radius: var(--radius);
        padding: 28px 24px 24px;
        margin-bottom: 20px;
        position: relative;
        overflow: hidden;
      }
      .total-card::after {
        content: '';
        position: absolute;
        right: -30px;
        top: -30px;
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background: rgba(255,255,255,0.08);
      }
      .total-label {
        font-size: 14px;
        opacity: 0.85;
        margin-bottom: 8px;
      }
      .month-nav {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }
      .month-nav-btn {
        background: rgba(255,255,255,0.2);
        border: none;
        color: white;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .month-nav-btn:hover { background: rgba(255,255,255,0.3); }
      .month-label {
        font-size: 15px;
        font-weight: 500;
      }
      .total-amount {
        font-size: 42px;
        font-weight: 700;
        letter-spacing: -1px;
        position: relative;
        z-index: 1;
      }
      .total-amount .yuan { font-size: 20px; font-weight: 400; margin-right: 2px; }

      /* Category List */
      .section-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 12px;
      }
      .cat-card {
        background: var(--card);
        border-radius: var(--radius);
        padding: 0;
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      .cat-item {
        display: flex;
        align-items: center;
        padding: 14px 16px;
        border-bottom: 1px solid #F0F0F0;
        cursor: pointer;
        transition: background 0.1s;
      }
      .cat-item:last-child { border-bottom: none; }
      .cat-item:hover { background: #FAFAFA; }
      .cat-icon {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        margin-right: 12px;
        flex-shrink: 0;
      }
      .cat-info { flex: 1; min-width: 0; }
      .cat-name {
        font-size: 15px;
        font-weight: 500;
        color: var(--text);
      }
      .cat-count {
        font-size: 12px;
        color: var(--text-hint);
        margin-top: 2px;
      }
      .cat-amount {
        font-size: 16px;
        font-weight: 600;
        color: var(--text);
        margin-left: 8px;
      }
      .cat-empty {
        text-align: center;
        padding: 32px 16px;
        color: var(--text-hint);
        font-size: 14px;
      }

      /* Expense Detail List */
      .detail-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px;
        border-bottom: 1px solid #F0F0F0;
        cursor: pointer;
      }
      .detail-header:hover { background: #FAFAFA; }
      .detail-title {
        font-size: 16px;
        font-weight: 600;
      }
      .detail-total {
        font-size: 16px;
        font-weight: 700;
        color: var(--primary);
      }
      .expense-row {
        display: flex;
        align-items: center;
        padding: 12px 16px;
        border-bottom: 1px solid #F5F5F5;
      }
      .expense-row:last-child { border-bottom: none; }
      .expense-date {
        font-size: 13px;
        color: var(--text-hint);
        width: 60px;
        flex-shrink: 0;
      }
      .expense-note {
        flex: 1;
        font-size: 14px;
        color: var(--text-secondary);
        margin: 0 8px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .expense-amount {
        font-size: 15px;
        font-weight: 600;
        color: var(--text);
        flex-shrink: 0;
      }
      .expense-delete {
        margin-left: 8px;
        background: none;
        border: none;
        color: var(--text-hint);
        cursor: pointer;
        font-size: 16px;
        padding: 4px;
        border-radius: 4px;
        opacity: 0.5;
        transition: opacity 0.15s;
      }
      .expense-delete:hover { opacity: 1; color: var(--danger); }

      /* Modal Overlay */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.45);
        display: flex;
        align-items: flex-end;
        justify-content: center;
        z-index: 1000;
        animation: fadeIn 0.2s ease;
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideUp {
        from { transform: translateY(100%); }
        to { transform: translateY(0); }
      }
      .modal-content {
        background: var(--card);
        width: 100%;
        max-width: 480px;
        border-radius: 20px 20px 0 0;
        padding: 24px 20px 32px;
        animation: slideUp 0.25s ease;
        max-height: 85vh;
        overflow-y: auto;
      }
      .modal-title {
        font-size: 18px;
        font-weight: 700;
        text-align: center;
        margin-bottom: 24px;
      }

      /* Form */
      .form-label {
        font-size: 14px;
        font-weight: 500;
        color: var(--text-secondary);
        margin-bottom: 8px;
        display: block;
      }
      .form-row {
        margin-bottom: 20px;
      }
      .category-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }
      .category-chip {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        padding: 12px 4px;
        border-radius: var(--radius);
        border: 2px solid var(--border);
        background: white;
        cursor: pointer;
        transition: all 0.15s;
      }
      .category-chip:hover { border-color: #ccc; }
      .category-chip.selected {
        border-color: var(--primary);
        background: var(--primary-light);
      }
      .category-chip-icon { font-size: 22px; }
      .category-chip-label { font-size: 12px; color: var(--text-secondary); }
      .category-chip.selected .category-chip-label { color: var(--primary); font-weight: 600; }

      .form-input {
        width: 100%;
        height: 48px;
        border: 2px solid var(--border);
        border-radius: var(--radius);
        padding: 0 16px;
        font-size: 16px;
        color: var(--text);
        background: white;
        outline: none;
        transition: border-color 0.15s;
      }
      .form-input:focus { border-color: var(--primary); }
      .form-input::placeholder { color: #CCC; }
      .amount-input-wrapper {
        position: relative;
      }
      .amount-input-wrapper .yuan-symbol {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 18px;
        font-weight: 600;
        color: var(--text);
      }
      .amount-input-wrapper .form-input {
        padding-left: 36px;
        font-size: 24px;
        font-weight: 600;
        height: 56px;
      }
      .form-textarea {
        width: 100%;
        height: 80px;
        border: 2px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 16px;
        font-size: 15px;
        color: var(--text);
        background: white;
        outline: none;
        resize: none;
        font-family: inherit;
        transition: border-color 0.15s;
      }
      .form-textarea:focus { border-color: var(--primary); }
      .form-textarea::placeholder { color: #CCC; }
      .form-date-input {
        width: 100%;
        height: 48px;
        border: 2px solid var(--border);
        border-radius: var(--radius);
        padding: 0 16px;
        font-size: 15px;
        color: var(--text);
        background: white;
        outline: none;
      }
      .btn-submit {
        width: 100%;
        height: 52px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: var(--radius);
        font-size: 17px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      .btn-submit:hover { opacity: 0.9; }
      .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
      .btn-cancel {
        width: 100%;
        height: 44px;
        background: none;
        color: var(--text-hint);
        border: none;
        font-size: 15px;
        cursor: pointer;
        margin-top: 8px;
      }

      /* Stats Page */
      .stats-total-bar {
        background: var(--card);
        border-radius: var(--radius);
        padding: 20px;
        box-shadow: var(--shadow);
        margin-bottom: 16px;
        text-align: center;
      }
      .stats-total-value {
        font-size: 32px;
        font-weight: 700;
        color: var(--primary);
      }
      .stats-total-label {
        font-size: 13px;
        color: var(--text-hint);
        margin-top: 4px;
      }
      .chart-card {
        background: var(--card);
        border-radius: var(--radius);
        padding: 16px;
        box-shadow: var(--shadow);
        margin-bottom: 16px;
      }
      .chart-title {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 12px;
      }
      .chart-container {
        position: relative;
      }

      /* Split Card */
      .split-card {
        background: var(--card);
        border-radius: var(--radius);
        padding: 16px 20px;
        box-shadow: var(--shadow);
        margin-bottom: 16px;
      }
      .split-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .split-title {
        font-size: 15px;
        font-weight: 600;
      }
      .split-badge {
        font-size: 13px;
        color: var(--primary);
        font-weight: 600;
        background: var(--primary-light);
        padding: 4px 10px;
        border-radius: 20px;
      }
      .split-amount {
        font-size: 28px;
        font-weight: 700;
        color: var(--primary);
        margin-bottom: 4px;
      }
      .split-amount .yuan { font-size: 16px; font-weight: 400; }
      .split-desc {
        font-size: 13px;
        color: var(--text-hint);
      }
      .split-toggle {
        background: none;
        border: none;
        color: var(--primary);
        font-size: 13px;
        cursor: pointer;
        margin-top: 8px;
        padding: 4px 0;
      }
      .split-detail-row {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-top: 1px solid #F0F0F0;
        font-size: 14px;
        color: var(--text-secondary);
      }
      .split-detail-amount {
        font-weight: 600;
        color: var(--text);
      }

      /* Yearly Page */
      .yearly-summary {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 16px;
      }
      .yearly-summary-card {
        background: var(--card);
        border-radius: var(--radius);
        padding: 16px;
        box-shadow: var(--shadow);
        text-align: center;
      }
      .yearly-summary-value {
        font-size: 22px;
        font-weight: 700;
        color: var(--primary);
      }
      .yearly-summary-label {
        font-size: 12px;
        color: var(--text-hint);
        margin-top: 4px;
      }
      .year-nav {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        margin-bottom: 16px;
      }
      .year-nav-btn {
        background: var(--card);
        border: 1px solid var(--border);
        width: 36px;
        height: 36px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text);
      }
      .year-nav-btn:hover { background: #F0F0F0; }
      .year-label {
        font-size: 18px;
        font-weight: 700;
        color: var(--text);
      }
      .monthly-bars {
        background: var(--card);
        border-radius: var(--radius);
        padding: 16px;
        box-shadow: var(--shadow);
      }

      /* Settings */
      .settings-card {
        background: var(--card);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
        margin-bottom: 16px;
      }
      .settings-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px;
        border-bottom: 1px solid #F0F0F0;
      }
      .settings-item:last-child { border-bottom: none; }
      .settings-label {
        font-size: 15px;
        color: var(--text);
      }
      .settings-desc {
        font-size: 12px;
        color: var(--text-hint);
        margin-top: 2px;
      }
      .stepper {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .stepper-btn {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 1px solid var(--border);
        background: var(--card);
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text);
        transition: all 0.15s;
      }
      .stepper-btn:hover { background: #F0F0F0; }
      .stepper-btn:disabled { opacity: 0.3; cursor: not-allowed; }
      .stepper-value {
        font-size: 18px;
        font-weight: 700;
        min-width: 24px;
        text-align: center;
      }
      .btn-danger {
        width: 100%;
        padding: 14px;
        background: none;
        border: none;
        color: var(--danger);
        font-size: 15px;
        cursor: pointer;
        text-align: center;
      }
      .btn-danger:hover { background: #FFF5F5; }

      /* Toast */
      .toast {
        position: fixed;
        top: 20%;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.75);
        color: white;
        padding: 10px 24px;
        border-radius: 8px;
        font-size: 14px;
        z-index: 2000;
        animation: toastIn 0.2s ease;
        pointer-events: none;
      }
      @keyframes toastIn {
        from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        to { opacity: 1; transform: translateX(-50%) translateY(0); }
      }

      /* Confirm Dialog */
      .confirm-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }
      .confirm-box {
        background: var(--card);
        border-radius: var(--radius);
        padding: 28px 24px 20px;
        width: 300px;
        text-align: center;
      }
      .confirm-msg {
        font-size: 15px;
        color: var(--text);
        margin-bottom: 24px;
        line-height: 1.5;
      }
      .confirm-actions {
        display: flex;
        gap: 12px;
      }
      .confirm-btn {
        flex: 1;
        height: 42px;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        border: none;
      }
      .confirm-btn-cancel {
        background: #F0F0F0;
        color: var(--text-secondary);
      }
      .confirm-btn-ok {
        background: var(--danger);
        color: white;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
